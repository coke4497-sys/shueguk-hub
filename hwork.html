<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>H WORK · 교사용</title>
<meta name="description" content="이수경국어 H WORK 교사용 — 출제 / 제출 확인" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gowun+Dodum&display=swap" rel="stylesheet" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%23DCE9E4'/%3E%3C/svg%3E" />
<style>
  :root{
    --bg:#E4EFEA; --surface:#FFFFFF;
    --ink:#2A332F; --ink-soft:#65726B;
    --accent:#3A6B5E; --icon:#3F4541; --icon-bg:#EBF0ED;
    --line:#D7E3DD; --line-soft:#E5EDE8; --radius:18px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Gowun Dodum","Apple SD Gothic Neo","Malgun Gothic",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    font-size:16px; line-height:1.75; -webkit-font-smoothing:antialiased; padding:0 0 88px;
  }
  .wrap{max-width:560px;margin:0 auto;padding:0 22px;}

  .back{
    display:inline-flex;align-items:center;gap:6px;
    margin:26px 0 0;color:var(--ink-soft);text-decoration:none;font-size:.86rem;
  }
  .back svg{width:16px;height:16px;}
  .back:hover{color:var(--accent);}

  header{padding:18px 4px 30px;text-align:center;}
  .tagline{font-family:"Gowun Batang",serif;font-size:1.5rem;font-weight:700;color:var(--accent);margin:0;letter-spacing:.01em;}
  .intro{color:var(--ink-soft);font-size:.94rem;margin:10px auto 0;max-width:24em;line-height:1.85;}

  .grid{display:grid;gap:14px;grid-template-columns:repeat(2,1fr);}
  .card{
    display:flex;flex-direction:column;align-items:flex-start;
    background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--radius);
    padding:24px 22px 22px;text-decoration:none;color:inherit;min-height:160px;
    transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease;
  }
  .card:hover{transform:translateY(-3px);border-color:var(--line);box-shadow:0 12px 28px rgba(42,51,47,.08);}
  .icon{width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;background:var(--icon-bg);color:var(--icon);margin-bottom:16px;}
  .icon svg{width:24px;height:24px;}
  .card h2{font-family:"Gowun Batang",serif;font-size:1.16rem;font-weight:700;margin:0;letter-spacing:-.01em;}
  .card .desc{margin:7px 0 0;color:var(--ink-soft);font-size:.86rem;line-height:1.55;flex:1;}
  .go{margin-top:16px;display:inline-flex;align-items:center;gap:5px;font-size:.82rem;color:var(--accent);}
  .go svg{width:15px;height:15px;transition:transform .16s ease;}
  .card:hover .go svg{transform:translateX(4px);}

  footer{text-align:center;margin-top:46px;color:var(--ink-soft);font-size:.82rem;line-height:2;}

  @media (max-width:430px){
    .grid{grid-template-columns:1fr;}
    .card{min-height:0;}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none !important;}}
</style>
</head>
<body>
<main class="wrap">
  <a class="back" href="index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 18l-6-6 6-6"/></svg>
    교사용 허브
  </a>

  <header>
    <p class="tagline">H WORK</p>
    <p class="intro">숙제 출제와 제출 확인을 선택하세요.</p>
  </header>

  <div class="grid" id="grid"></div>

  <footer>
    <p>이수경국어 Shueguk · 교사용</p>
  </footer>
</main>

<script>
  const ICON = {
    pencil:'<path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>',
    clipboard:'<path d="M9 3h6a1 1 0 0 1 1 1v1a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/><path d="M16 5h2a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2"/><path d="M9 14l2 2 4-4"/>'
  };

  const menu = [
    { title:"출제",  icon:"pencil",    url:"https://coke4497-sys.github.io/shueguk-h-work/homework_key.html", desc:"숙제 문제 출제하기" },
    { title:"확인",  icon:"clipboard", url:"https://coke4497-sys.github.io/shueguk-h-work/hwork_teacher.html", desc:"제출 현황 확인하기" },
  ];

  const grid = document.getElementById("grid");
  const svg = inner => `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${inner}</svg>`;

  menu.forEach(m => {
    const a = document.createElement("a");
    a.className = "card";
    a.href = m.url;
    a.innerHTML = `
      <span class="icon">${svg(ICON[m.icon])}</span>
      <h2>${m.title}</h2>
      <p class="desc">${m.desc}</p>
      <span class="go">열기 ${svg('<path d="M5 12h14M13 6l6 6-6 6"/>')}</span>`;
    grid.appendChild(a);
  });
</script>
</body>
</html>
