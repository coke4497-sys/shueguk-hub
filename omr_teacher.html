<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>이수경국어 · 성적 관리</title>
<meta name="theme-color" content="#c4d4cc" />
<style>
  html,body{margin:0;padding:0;height:100%;background:#f7f6f3;}
  body{overflow:hidden;display:flex;flex-direction:column;}
  .appbar{
    flex:none;display:flex;align-items:center;gap:8px;padding:12px 16px;
    background:#E4EFEA;border-bottom:1px solid #D7E3DD;
  }
  .appbar a.back{
    display:inline-flex;align-items:center;gap:6px;color:#65726B;text-decoration:none;
    font-family:-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;font-size:14px;
  }
  .appbar a.back:hover{ color:#3A6B5E; }
  .appbar a.back svg{ width:16px; height:16px; }
  .appbar .ttl{ margin-left:auto; font-family:'Gowun Batang',serif; font-size:12.5px; color:#65726B; letter-spacing:1px; }
  .stage{ position:relative; flex:1; min-height:0; }
  iframe{width:100%;height:100%;border:0;display:block;}
  .loading{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-family:'Gowun Batang',serif,-apple-system,sans-serif;color:#8d83a8;font-size:15px;
    background:#f7f6f3;letter-spacing:1px;z-index:1;
  }
</style>
</head>
<body>
  <div class="appbar">
    <a class="back" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 18l-6-6 6-6"/></svg>
      티쳐스 메인 페이지로 가기
    </a>
    <span class="ttl">성적 대시보드</span>
  </div>
  <div class="stage">
    <div class="loading" id="loading">성적 관리 불러오는 중…</div>
    <iframe
      src="https://script.google.com/macros/s/AKfycbyUHMdCH_u35Oeu6lEmx3yOYscoKLwEB8TC0QHGBOaCXZ4rbAnkMpP9_Na4l3QLOajGPA/exec?page=teacher"
      allow="clipboard-write"
      title="이수경국어 성적 관리"
      onload="var l=document.getElementById('loading'); if(l) l.style.display='none';"></iframe>
  </div>
</body>
</html>
