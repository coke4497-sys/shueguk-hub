<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>슈국 티쳐스 페이지</title>
<meta name="description" content="이수경국어 Shueguk 교사용 운영 도구 — 어휘·문법 테스트, H WORK, 주말 실전모의고사, 클리닉 신청 현황, 지필고사 리포트" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gowun+Dodum&family=Sacramento&display=swap" rel="stylesheet" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%23DCE9E4'/%3E%3C/svg%3E" />
<style>
  :root{
    --bg:#E4EFEA; --surface:#FFFFFF;
    --ink:#2A332F; --ink-soft:#65726B;
    --accent:#3A6B5E; --icon:#3F4541; --icon-bg:#EBF0ED;
    --line:#D7E3DD; --line-soft:#E5EDE8; --radius:18px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Gowun Dodum","Apple SD Gothic Neo","Malgun Gothic",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    font-size:16px; line-height:1.75; -webkit-font-smoothing:antialiased; padding:0 0 88px;
  }
  .wrap{max-width:720px;margin:0 auto;padding:0 22px;}

  /* Header */
  header{padding:64px 22px 36px;text-align:center;}
  .brand{margin:0 auto 2px;}
  .brand .script{font-family:"Sacramento",cursive;font-size:4.6rem;line-height:1;color:var(--ink);font-weight:400;}
  .tagline{font-family:"Gowun Batang",serif;font-size:1.16rem;font-weight:700;color:var(--accent);margin:14px 0 0;letter-spacing:.01em;}
  .intro{color:var(--ink-soft);font-size:.94rem;margin:12px auto 0;max-width:28em;line-height:1.85;}

  /* Grid 3 × 2 */
  .grid{display:grid;gap:14px;margin-top:14px;grid-template-columns:repeat(3,1fr);}
  .card{
    display:flex;flex-direction:column;align-items:flex-start;
    background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--radius);
    padding:22px 20px 20px;text-decoration:none;color:inherit;min-height:152px;
    transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease;
  }
  a.card:hover{transform:translateY(-3px);border-color:var(--line);box-shadow:0 12px 28px rgba(42,51,47,.08);}
  .icon{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;background:var(--icon-bg);color:var(--icon);margin-bottom:16px;}
  .icon svg{width:23px;height:23px;}
  .card h2{font-family:"Gowun Batang",serif;font-size:1.1rem;font-weight:700;margin:0;letter-spacing:-.01em;line-height:1.35;}
  .card .desc{margin:6px 0 0;color:var(--ink-soft);font-size:.84rem;line-height:1.55;flex:1;}
  .go{margin-top:14px;display:inline-flex;align-items:center;gap:5px;font-size:.8rem;color:var(--accent);}
  .go svg{width:15px;height:15px;transition:transform .16s ease;}
  a.card:hover .go svg{transform:translateX(4px);}
  /* 준비 중(비활성) */
  .card.pending{opacity:.6;cursor:default;}
  .tag{margin-top:14px;display:inline-block;font-size:.74rem;color:var(--ink-soft);
    background:#DCE6E0;border-radius:20px;padding:3px 11px;}

  footer{text-align:center;margin-top:48px;color:var(--ink-soft);font-size:.82rem;line-height:2;}
  footer a{color:var(--accent);text-decoration:none;}

  @media (max-width:560px){.grid{grid-template-columns:repeat(2,1fr);}}
  @media (max-width:380px){
    header{padding:48px 22px 26px;}
    .brand .script{font-size:3.7rem;}
    .grid{grid-template-columns:1fr;}
    .card{min-height:0;}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none !important;}}
</style>
</head>
<body>
<header>
  <div class="brand"><span class="script">Shueguk</span></div>
  <p class="tagline">슈국 티쳐스 페이지</p>
  <p class="intro">이수경국어 수업 운영 도구를 한곳에 모았습니다.<br />필요한 메뉴를 선택하세요.</p>
</header>

<main class="wrap">
  <div class="grid" id="grid"></div>

  <footer>
    <p>이수경국어 Shueguk · 교사용</p>
    <p><a href="https://github.com/coke4497-sys" target="_blank" rel="noopener">@coke4497-sys</a></p>
  </footer>
</main>

<script>
  // 배치(3 × 2) ─ 1줄: 어휘 테스트·문법 테스트·H WORK / 2줄: 주말 실전모의고사·클리닉 신청 현황·지필고사 리포트
  // url 빈값 + pending:true → '준비 중' 비활성 카드
  const ICON = {
    book:'<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>',
    pencil:'<path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>',
    clipboard:'<path d="M9 3h6a1 1 0 0 1 1 1v1a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/><path d="M16 5h2a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2"/><path d="M9 14l2 2 4-4"/>',
    paper:'<path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><path d="M9 13h6M9 17h6"/>',
    pulse:'<path d="M22 12h-4l-3 8L9 4l-3 8H2"/>',
    chart:'<line x1="6" y1="21" x2="6" y2="15"/><line x1="12" y1="21" x2="12" y2="9"/><line x1="18" y1="21" x2="18" y2="4"/>'
  };

  const projects = [
    { title:"어휘 테스트",       icon:"book",      url:"voca.html",                                                                    desc:"링크 발송 · 결과 확인" },
    { title:"문법 테스트",       icon:"pencil",    url:"https://coke4497-sys.github.io/shueguk-gramma/shueguk-teacher-dashboard.html", desc:"테스트 결과 관리" },
    { title:"H WORK",            icon:"clipboard", url:"hwork.html",                                                                   desc:"출제 · 제출 확인" },
    { title:"주말 실전모의고사", icon:"paper",     url:"weekend.html",                                                                 desc:"출제 · 응시 · 성적" },
    { title:"클리닉",            icon:"pulse",     url:"clinic.html",                                                                  desc:"신청 링크 · 신청 확인" },
    { title:"지필고사 리포트",   icon:"chart",     url:"https://coke4497-sys.github.io/shueguk-report/t.html",                         desc:"성적 리포트" },
  ];

  const grid = document.getElementById("grid");
  const svg = inner => `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${inner}</svg>`;

  projects.forEach(p => {
    const inner = `
      <span class="icon">${svg(ICON[p.icon])}</span>
      <h2>${p.title}</h2>
      <p class="desc">${p.desc}</p>`;
    let el;
    if (p.pending){
      el = document.createElement("div");
      el.className = "card pending";
      el.innerHTML = inner + `<span class="tag">준비 중</span>`;
    } else {
      el = document.createElement("a");
      el.className = "card";
      el.href = p.url;
      el.innerHTML = inner + `<span class="go">열기 ${svg('<path d="M5 12h14M13 6l6 6-6 6"/>')}</span>`;
    }
    grid.appendChild(el);
  });
</script>
</body>
</html>
