<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>어휘 테스트 · 슈국 티쳐스</title>
<meta name="description" content="이수경국어 어휘 테스트 교사용 — 학생 발송 링크 / 결과 확인" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gowun+Dodum&display=swap" rel="stylesheet" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%23DCE9E4'/%3E%3C/svg%3E" />
<style>
  :root{
    --bg:#E4EFEA; --surface:#FFFFFF;
    --ink:#2A332F; --ink-soft:#65726B;
    --accent:#3A6B5E; --icon:#3F4541; --icon-bg:#EBF0ED;
    --line:#D7E3DD; --line-soft:#E5EDE8; --radius:18px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Gowun Dodum","Apple SD Gothic Neo","Malgun Gothic",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    font-size:16px; line-height:1.75; -webkit-font-smoothing:antialiased; padding:0 0 88px;
  }
  .wrap{max-width:600px;margin:0 auto;padding:0 22px;}

  .back{display:inline-flex;align-items:center;gap:6px;margin:26px 0 0;color:var(--ink-soft);text-decoration:none;font-size:.86rem;}
  .back svg{width:16px;height:16px;}
  .back:hover{color:var(--accent);}

  header{padding:18px 4px 30px;text-align:center;}
  .tagline{font-family:"Gowun Batang",serif;font-size:1.5rem;font-weight:700;color:var(--accent);margin:0;letter-spacing:.01em;}
  .intro{color:var(--ink-soft);font-size:.94rem;margin:10px auto 0;max-width:25em;line-height:1.85;}

  .list{display:flex;flex-direction:column;gap:14px;}
  .card{
    display:flex;align-items:center;gap:18px;
    background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--radius);
    padding:20px 22px;text-decoration:none;color:inherit;
    transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease;
  }
  .card:hover{transform:translateY(-2px);border-color:var(--line);box-shadow:0 10px 26px rgba(42,51,47,.07);}
  .icon{width:48px;height:48px;flex:none;border-radius:13px;display:flex;align-items:center;justify-content:center;background:var(--icon-bg);color:var(--icon);}
  .icon svg{width:24px;height:24px;}
  .body{flex:1;min-width:0;}
  .card h2{font-family:"Gowun Batang",serif;font-size:1.16rem;font-weight:700;margin:0;letter-spacing:-.01em;}
  .card .desc{margin:3px 0 0;color:var(--ink-soft);font-size:.88rem;line-height:1.5;}
  .go{margin-top:12px;display:inline-flex;align-items:center;gap:5px;font-size:.82rem;color:var(--accent);}
  .go svg{width:15px;height:15px;transition:transform .16s ease;}
  .card:hover .go svg{transform:translateX(4px);}

  footer{text-align:center;margin-top:46px;color:var(--ink-soft);font-size:.82rem;line-height:2;}

  /* 어휘 켜기/끄기 토글 */
  .toggle-box{display:flex;align-items:center;justify-content:space-between;gap:14px;
    background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--radius);
    padding:18px 20px;margin-bottom:16px;}
  .t-info{min-width:0;}
  .t-label{font-family:"Gowun Batang",serif;font-weight:700;font-size:1.05rem;margin:0;color:var(--ink);}
  .t-state{margin:4px 0 0;font-size:.84rem;color:var(--ink-soft);line-height:1.5;}
  .t-state.on{color:var(--accent);}
  .t-state.off{color:#B4544A;}
  .t-btn{flex:none;border:none;border-radius:11px;padding:11px 22px;font:inherit;font-weight:700;
    font-size:.92rem;cursor:pointer;color:#fff;background:var(--accent);transition:opacity .15s, background .15s;}
  .t-btn.off{background:#B4544A;}
  .t-btn:disabled{opacity:.55;cursor:default;}
  .t-btn:active{opacity:.85;}

  @media (prefers-reduced-motion:reduce){*{transition:none !important;}}
</style>
</head>
<body>
<main class="wrap">
  <a class="back" href="index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 18l-6-6 6-6"/></svg>
    티쳐스 메인 페이지로 가기
  </a>

  <header>
    <p class="tagline">어휘 테스트</p>
    <p class="intro">학생에게 보낼 발송 링크와 결과 확인을 선택하세요.</p>
  </header>

  <!-- 학생 페이지 어휘 테스트 켜기/끄기 -->
  <div class="toggle-box">
    <div class="t-info">
      <p class="t-label">학생 페이지 어휘 테스트</p>
      <p class="t-state" id="vocaState">상태 불러오는 중…</p>
    </div>
    <button type="button" class="t-btn" id="vocaBtn" disabled>…</button>
  </div>

  <div class="list">
    <!-- 링크 발송 -->
    <a class="card" href="https://coke4497-sys.github.io/shueguk-voca/links.html" target="_blank" rel="noopener">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      </span>
      <span class="body">
        <h2>링크 발송</h2>
        <p class="desc">학년·주차별 학생 응시 링크를 복사해요.</p>
        <span class="go">열기
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </span>
      </span>
    </a>

    <!-- 결과 확인 -->
    <a class="card" href="https://coke4497-sys.github.io/shueguk-voca/shueguk-teacher-dashboard.html" target="_blank" rel="noopener">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="21" x2="6" y2="15"/><line x1="12" y1="21" x2="12" y2="9"/><line x1="18" y1="21" x2="18" y2="4"/></svg>
      </span>
      <span class="body">
        <h2>결과 확인</h2>
        <p class="desc">학년·주차별 제출 리스트, 점수, 틀린 문제를 확인해요.</p>
        <span class="go">열기
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </span>
      </span>
    </a>
  </div>

  <footer><p>이수경국어 Shueguk · 교사용</p></footer>
</main>

<script>
  // 리포트 백엔드(어휘 켜기/끄기 상태 저장). s.html 과 동일한 엔드포인트.
  var REPORT_URL = "https://script.google.com/macros/s/AKfycbzhCncBwn-JlqXARC3wfrWUCuNHzlNK2df0bdhx-w78Xr8mzYUcIYZOJdRi9N4bHtsb/exec";
  var stateEl = document.getElementById("vocaState");
  var btnEl = document.getElementById("vocaBtn");
  var vocaOpen = null;

  function render(){
    if(vocaOpen === null){
      stateEl.textContent = "상태를 불러올 수 없어요"; stateEl.className = "t-state";
      btnEl.textContent = "다시 시도"; btnEl.className = "t-btn"; btnEl.disabled = false; return;
    }
    stateEl.textContent = vocaOpen
      ? "지금 켜져 있어요 — 학생이 응시할 수 있어요"
      : "지금 꺼져 있어요 — 학생 카드가 '준비 중'으로 보여요";
    stateEl.className = "t-state " + (vocaOpen ? "on" : "off");
    btnEl.textContent = vocaOpen ? "끄기" : "켜기";
    btnEl.className = "t-btn " + (vocaOpen ? "off" : "");
    btnEl.disabled = false;
  }
  function load(){
    btnEl.disabled = true; btnEl.textContent = "…";
    fetch(REPORT_URL + "?action=vocaStatus&t=" + Date.now())
      .then(function(r){ return r.json(); })
      .then(function(d){ vocaOpen = (d && d.result === "success") ? !!d.open : null; render(); })
      .catch(function(){ vocaOpen = null; render(); });
  }
  btnEl.addEventListener("click", function(){
    if(vocaOpen === null){ load(); return; }
    var pw = prompt("비밀번호를 입력하세요");
    if(pw === null) return;
    var target = vocaOpen ? 0 : 1;
    btnEl.disabled = true; btnEl.textContent = "처리 중…";
    fetch(REPORT_URL + "?action=setVoca&open=" + target + "&pw=" + encodeURIComponent(pw) + "&t=" + Date.now())
      .then(function(r){ return r.json(); })
      .then(function(d){
        if(d && d.result === "success"){ vocaOpen = !!d.open; render(); }
        else if(d && d.message === "unauthorized"){ alert("비밀번호가 틀렸어요."); render(); }
        else { alert("문제가 생겼어요. 다시 시도해 주세요."); render(); }
      })
      .catch(function(){ alert("연결에 실패했어요."); render(); });
  });
  load();
</script>
</body>
</html>
